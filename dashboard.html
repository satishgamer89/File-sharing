<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="css/dashboard.css">
<link rel="stylesheet" href="css/upload.css">
<link rel="stylesheet" href="css/documents.css">
<link rel="stylesheet" href="css/buttons.css">
<link rel="stylesheet" href="css/responsive.css">
</head>

<body>

<div class="dashboard">

<header class="topbar">

<div>

<h1 class="logo">
📁 Family Vault
</h1>

<p class="welcome">
Welcome Back 👋
</p>

<p id="userEmail" class="email"></p>

</div>

<button
id="logoutBtn"
class="logout-btn">

Logout

</button>

</header>


<div class="stats">

<div class="stat-card">

<div class="stat-icon">
📄
</div>

<div>

<h2 id="docCount">
0
</h2>

<p>
Documents
</p>

</div>

</div>

<div class="stat-card">

<div class="stat-icon">
💾
</div>

<div>

<h2 id="storageUsed">
--
</h2>

<p>
Storage
</p>

</div>

</div>

</div>


<div class="search-card">

<input
id="searchInput"
type="text"
placeholder="🔍 Search documents...">

</div>


<div class="upload-card">

<h2>

📤 Upload Document

</h2>

<input
type="text"
id="title"
placeholder="Document Title">

<input
type="file"
id="fileInput">

<button
id="uploadBtn">

Upload Document

</button>

</div>


<div class="documents-header">

<h2>

My Documents

</h2>

</div>

<div
id="documents"
class="documents-grid">

</div>

</div>

<script
type="module"
src="./js/dashboard.js">
</script>

</body>
</html>
