<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
</head>
<body>

<h2>Login</h2>

<input
type="email"
id="email"
placeholder="Email">

<br><br>

<input
type="password"
id="password"
placeholder="Password">

<br><br>

<button id="loginBtn">
Login
</button>

<p id="message"></p>

<script type="module">

import { supabase } from './js/supabase.js';

const btn =
document.getElementById("loginBtn");

btn.addEventListener("click", async ()=>{

const email =
document.getElementById("email").value;

const password =
document.getElementById("password").value;

const { error } =
await supabase.auth.signInWithPassword({
email,
password
});

if(error){

document.getElementById("message")
.innerText =
error.message;

}else{

window.location =
"dashboard.html";

}

});

</script>

</body>
</html>
