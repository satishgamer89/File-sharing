<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabaseUrl = "https://imtjsxymsbeezpggdvpd.supabase.co";
  const supabaseKey = "sb_publishable_wEKrcNR0Et7FixZIBMJg4Q_tiSIl4C1";

  const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

  async function init() {
    try {
      // Step 1: try normal session first
      const { data: sessionData } = await supabaseClient.auth.getSession();

      if (sessionData?.session) {
        console.log("Already logged in:", sessionData.session.user.email);
        return;
      }

      // Step 2: handle email redirect login
      const { data, error } = await supabaseClient.auth.getSessionFromUrl({
        storeSession: true
      });

      if (error) {
        console.log("Auth error:", error.message);
        return;
      }

      if (data?.session) {
        console.log("LOGIN SUCCESS:", data.session.user.email);

        // IMPORTANT: stop weird reload / 404 behavior
        window.location.href = "/File-sharing/";
      }

    } catch (e) {
      console.log("Crash safe:", e);
    }
  }

  init();
</script>
