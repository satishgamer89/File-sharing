<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
  const supabaseClient = supabase.createClient(
    "https://imtjsxymsbeezpggdvpd.supabase.co",
    "sb_publishable_wEKrcNR0Et7FixZIBMJg4Q_tiSIl4C1"
  );

  async function init() {
    console.log("Page loaded");

    // STEP 1: check normal session
    const { data: sessionData } = await supabaseClient.auth.getSession();

    if (sessionData?.session) {
      console.log("Already logged in:", sessionData.session.user.email);
      return;
    }

    // STEP 2: handle email redirect login
    const { data, error } =
  await supabaseClient.auth.exchangeCodeForSession(window.location.href);

    console.log("Auth result:", data, error);

    if (data?.session) {
      console.log("LOGIN SUCCESS:", data.session.user.email);

      // clean URL
      window.history.replaceState({}, document.title, "/File-sharing/");
    } else {
      console.log("No session found in URL");
    }
  }

  init();
</script>
<script>
  console.log("🔥 TEST SCRIPT IS RUNNING");
